# Starter pipeline
# Start with a minimal pipeline that you can customize to build and deploy your code.
# Add steps that build, run tests, deploy, and more:
# https://aka.ms/yaml

trigger:
- main

pool:
  vmImage: Default

steps:
  - task: CMake@1
    displayName: 'Configure'
    inputs:
      workingDirectory: 'build'
      cmakeArgs: '..'

  - task: CMake@1
    displayName: 'Build'
    inputs:
      workingDirectory: 'build'
      cmakeArgs: '--build .'

  - script: |
      cd build
      ./malloc_impl
    displayName: 'Run'
